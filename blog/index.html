<!DOCTYPE html>
<head>
    <meta charset='utf-8'>
    <title>東方の常識問題</title>
    <script>function getlevel(){
        if(document.getElementById('suikakuitai').value == "フランドールスカーレット"){document.cookie = "yuki=True; path=/;";}else{
        let req = new XMLHttpRequest();
        req.addEventListener("load", function(){document.getElementById('info').textContent = this.responseText});
        req.open("GET", "/answer?q="+document.getElementById('suikakuitai').value);
        req.send();}
    }</script>
</head><div style="text-align: center">
<body>
   簡単な東方の問題です。<br>
   答えを白い枠に記入して、枠の右にある確認ボタンを押してください。<br>
   2022年の人気投票1位は？<br>
   わかるよね？<br>
　　間違えるわけないよね？<br>
　　間違えないと思うけど書いとくか<br>
　　フランドールスカーレット<br>

<input id="suikakuitai" type="text"></input><input type="button" onClick="getlevel()">確認</input>
    <div id="info">
        </div>
</body>
</html>
