<!DOCTYPE html>
<head>
    <meta charset='utf-8'>
    <title>東方の常識問題</title>
    <link rel="stylesheet" href="example.css">

    <div style="text-align: center">
    <script>function getlevel(){
        if(document.getElementById('word').value == "フランドールスカーレット"){document.cookie = "yuki=True; path=/;";}else{
        let req = new XMLHttpRequest();
        req.addEventListener("load", function(){document.getElementById('info').textContent = this.responseText});
        req.open("GET", "/answer?q="+document.getElementById('word').value);
        req.send();}
    }</script>
    
</head>
<body>
    <img src="https://github.com/nyanko2/furansama/blob/21b22769cf403fd589b247b7f72861dcce743aab/IMG_1201.png">
    <h3><font color=”#ffffff”>簡単な東方の問題です。</font></h3><br>
    <h3><font color=”#ffffff”>答えを白い枠に記入して、枠の右にある確認ボタンを押してください。</font></h3><br>
    <h3><font color=”#ffffff”>2022年の人気投票1位は？</font></h3><br>
    <h3><font color=”#ffffff”>わかるよね？</font></h3><br>
    <h3><font color=”#ffffff”>間違えるわけないよね？</font></h3><br>
　　 <h3><font color=”#ffffff”>間違えないと思うけど答え書いとくか</font></h3><br>
　　 <h3><font color=”#ffffff”>フランドールスカーレット</font></h3><br>

    <input id="word" type="text"></input><input type="button" onClick="getlevel()"><font color=”#ffffff”>確認</font></input>
     <div id="info">
</body>
</html>
